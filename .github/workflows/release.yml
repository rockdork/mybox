name: Release (macOS)

# 推送形如 v0.2.0 的 tag 时自动构建并发布 GitHub Release
# 注意：发布前请把 src-tauri/tauri.conf.json 里的 version 改成与 tag 一致
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14 # Apple Silicon (arm64)，与本地构建架构一致
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm install

      - name: Tauri build (unsigned)
        # 未配置 Apple 签名，产出未签名 dmg/pkg；用户首次打开需右键「打开」
        run: npm run tauri build

      - name: Package .app as zip (便于直接下载)
        run: |
          cd src-tauri/target/release/bundle/macos
          ditto -c -k --keepParent mybox.app mybox.app.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: mybox ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/pkg/*.pkg
            src-tauri/target/release/bundle/macos/mybox.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
