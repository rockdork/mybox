name: Release (macOS)

# 推送形如 v0.2.0 的 tag 时自动构建并发布 GitHub Release
# 注意：发布前请把 src-tauri/tauri.conf.json 里的 version 改成与 tag 一致
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14 # Apple Silicon (arm64)，与本地构建架构一致
    permissions:
      contents: write # 允许 softprops/action-gh-release 创建 GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm install

      - name: Tauri build (app bundle only — no dmg, no signing)
        # bundle.targets 已在 tauri.conf.json 设为 ["app"]：只产 .app，不产 dmg
        # 注意：不能用命令行 --bundles app，那会跳过 frontendDist 复制导致白屏
        # 签名由后续步骤手动完成（Tauri 内置 ad-hoc 签名不完整，会导致 Gatekeeper 报"已损毁"）
        run: npm run tauri build

      - name: Inject frontend into .app (Tauri 2 app bundle omits frontendDist copy)
        # Tauri 2 在纯 app bundle 模式下不把 frontendDist 复制进包，导致白屏。
        # 这里手动把 vite 构建产物注入 app 的 Resources，与 Tauri 正常打包结果一致。
        run: |
          APP="src-tauri/target/release/bundle/macos/mybox.app"
          cp -R dist/index.html "$APP/Contents/Resources/"
          cp -R dist/assets "$APP/Contents/Resources/"
          cp dist/*.svg "$APP/Contents/Resources/" 2>/dev/null || true
          echo "Frontend injected:" && ls "$APP/Contents/Resources/"

      - name: Deep ad-hoc sign .app (fixes Gatekeeper "damaged")
        run: |
          APP="src-tauri/target/release/bundle/macos/mybox.app"
          codesign --force --deep --sign - "$APP"
          codesign -v "$APP" && echo "SIGN OK — Gatekeeper will accept this"

      - name: Create DMG with installer UI
        run: |
          APP="src-tauri/target/release/bundle/macos/mybox.app"
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          mkdir -p "$DMG_DIR"
          npx --yes create-dmg "$APP" "$DMG_DIR" --overwrite --dmg-title="mybox" || {
            echo "create-dmg failed, using fallback staging-based dmg"
            STAGING=$(mktemp -d /tmp/mybox-stage-XXXXX)
            cp -R "$APP" "$STAGING/"
            ln -s /Applications "$STAGING/" 2>/dev/null || true
            hdiutil create -volname "mybox" -srcfolder "$STAGING" -ov -format UDZO "$DMG_DIR/mybox_${VERSION}_aarch64.dmg"
            rm -rf "$STAGING"
          }

      - name: Package signed .app as zip
        run: |
          cd src-tauri/target/release/bundle/macos
          ditto -c -k --keepParent mybox.app mybox.app.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: mybox ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/pkg/*.pkg
            src-tauri/target/release/bundle/macos/mybox.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
