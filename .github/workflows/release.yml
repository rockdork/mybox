name: Release (macOS)

# 推送形如 v0.2.0 的 tag 时自动构建并发布 GitHub Release
# 注意：发布前请把 src-tauri/tauri.conf.json 里的 version 改成与 tag 一致
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14 # Apple Silicon (arm64)，与本地构建架构一致
    permissions:
      contents: write # 允许 softprops/action-gh-release 创建 GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm install

      - name: Tauri build (ad-hoc signed)
        # 无 Apple Developer 证书，用 ad-hoc 签名避免 macOS 标记为「已损毁」
        env:
          TAURI_SIGNING_IDENTITY: "-" # ad-hoc sign（无需证书）
        run: npm run tauri build

      - name: Ad-hoc sign .app & repackage dmg
        # 对 .app 做 ad-hoc 签名后重新打 dmg（CI 产出的原始 dmg 可能未含签名）
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/mybox.app"
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          
          # 深度 ad-hoc 签名
          codesign --force --deep --sign - "$APP_PATH"
          codesign -v "$APP_PATH" 2>&1 || true
          
          # 删除旧 dmg，用 hdiutil 重新打包
          rm -f "$DMG_DIR"/*.dmg
          hdiutil create -volname "mybox" -srcfolder "$APP_PATH" -ov -format UDZO \
            "$DMG_DIR/mybox_${VERSION}_aarch64.dmg"
          
          echo "Signed dmg ready: $DMG_DIR/mybox_${VERSION}_aarch64.dmg"

      - name: Package .app as zip (便于直接下载)
        run: |
          cd src-tauri/target/release/bundle/macos
          ditto -c -k --keepParent mybox.app mybox.app.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: mybox ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/pkg/*.pkg
            src-tauri/target/release/bundle/macos/mybox.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
